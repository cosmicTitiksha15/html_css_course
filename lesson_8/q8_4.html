<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 8.4</title>

    <style>
        input{
            padding: 8px;
            border: 1px solid lightgrey;
            border-radius: 5px;
        }
        .box-1, .box-2{
            display: inline-block;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        .box-3{
            width: 370px;
            margin-bottom: 10px;
        }
        button{
            background-color: rgb(49, 121, 202);
            color: white;
            border: none;
            padding: 10px 165px;
            font-size: 18px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <input type="text" placeholder="First Name" class="box-1">
    <input type="text" placeholder="Last Name" class="box-2">
    <input type="text" placeholder="Email" class="box-3">
    <button>Sign up</button>
</body>
</html>
