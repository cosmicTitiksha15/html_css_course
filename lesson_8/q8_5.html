<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 8.5</title>
    <style>
        p{
            font-family: Arial;
            font-size: 27px;
            margin-bottom: 20px;
        }

        input{
            display: block;
            margin-bottom: 20px;
            padding: 10px;
            min-width: 300px;
            background-color: rgb(236, 235, 235);
            border: none;
        }

        .button-1{
            background-color: black;
            color: white;
            padding: 12px;
            margin-right: 10px;
            border: none;
        }
        .button-2{
            background-color: rgb(236, 235, 235);
            padding: 12px;
            margin-right: 10px;
            border: none;
        }
    </style>
</head>
<body>
    <p>
        Request a Ride Now
    </p>
    <input type="text" placeholder="Enter pickup location">
    <input type="text" placeholder="Enter Destination">
    <button class="button-1">
        Request now
    </button>
    <button class="button-2">
        Schedule for later
    </button>
</body>
</html>
