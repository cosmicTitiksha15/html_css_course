<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 9.8</title>
    <style>
        div{
            text-align: center;
        }

         .search-bar-2{
            padding: 10px 14px;
            min-width: 400px;
            border: none;
            font-size: 15px;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        img{
            width: 200px;
            margin-bottom: 0;
        }

        button{
            background-color: rgb(233, 233, 233);
            padding: 10px;
            font-size: 15px;
            border: none;
        }
    </style>
</head>
<body>
    <div>
        <img src="google-logo.png" alt="">
    </div>
    
    <div>
        <input type="text" name="" id="" placeholder="Search Google or type a URL" class="search-bar-2">
    </div>
    <div>
        <button style="margin-right: 10px;">
            Google Search
        </button>
        <button>
            I'm feeling lucky
        </button>
    </div>
    
</body>
</html>
