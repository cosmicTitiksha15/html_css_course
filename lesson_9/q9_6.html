<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 9.6</title>
    <style>
        *{
            font-family: Arial;
            margin: 0;
        }

        div{
            width: 150px;
            height: 250px;
            margin-left: 20px;
            margin-top: 30px;
            box-shadow: 0 0 5px rgba(0,0,0,0.6);
        }

        img{
            width: 150px;
            height: 150px;
            object-fit: cover;
        }
        .name{
            font-size: 17px;
            font-weight: bold;
            margin-left: 5px;
        }
        .friends{
            font-size: 12px;
            color: gray;
            margin: 5px;
        }
        button{
            background-color: rgb(43, 95, 236);
            color: white;
            padding: 10px;
            border: none;
            border-radius: 4px;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <div>
        <img src="cat.avif">
        <p class="name">Oliver</p>
        <p class="friends">2 Mutual Friends</p>
        <button>Add Friend</button>
    </div>
</body>
</html>
