<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 7.1</title>
    <style>
        .img-1{
            width: 200px;
            border-radius: 10px;
        }

        .img-2{
            height: 200px;
            width: 200px;
            object-fit: cover;
            object-position: center;
            border: 1px solid red;

        }

        .img-3{
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <img class="img-1" src="cat.avif" alt="">
    <img class="img-2" src="cat.avif" alt="">
    <img class="img-3" src="cat.avif" alt="">
</body>
</html>
