<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 7.4</title>
    <style>
        img{
            width: 50px;
            height: 50px;
            object-fit: cover;
            object-position: center;
            border-radius: 50%;
            vertical-align: middle;
        }

        input{
            vertical-align: middle;
            font-size: 17px;
            padding: 5px;
            border: none;
        }

        button{
            background-color: rgb(74, 100, 218);
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 20px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <img src="cat.avif" alt="">
    <input type="text" placeholder="What's Happening?">
    <button>Tweet</button>
</body>
</html>
